<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <style>
            body{
    font-family: Arial, sans-serif;
    text-align: left;
    margin: 100px 100px;
}

.top-right{
    position: absolute;
    top: 10px;
    right: 10px;
}

form{
    width: 700px;
}

.button-wrapper {
    display: flex;
    justify-content: flex-end;
    width: 630px;

}

label{
    display: inline-block;
    margin-top: 20px;
    font-size: 14px;
    width: 200px;
    vertical-align: top;
}

input[type="text"]{
    width: 400px;
    height: 25px;
    margin-top: 20px;
    border: 1px solid #ccc;
    padding: 4px 10px;
    font-size: 14px;
    border-radius: 4px;
}
input[type="submit"]{   
    padding: 10px 20px;
    background-color: #4285F4;
    color: white;
    margin-top: 30px;
    border: none;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
}
input[type="submit"]:hover {
            background-color: #357ae8;
        }
        p{
            font-size: 22px;
        }
        </style>
    </head>
    <body>
        <p>Find pages with...</p>
        <form action="https://google.com/search">
            <label>all these words: </label>
            <input type="text" name="as_q">
            <br>
            <label>this exact word or phrase: </label>
            <input type="text" name="as_epq">
            <br>
            <label>any of these words: </label>
            <input type="text" name="as_oq">
            <br>
            <label>none of these words: </label>
            <input type="text" name="as_eq">
            <br>
            <div class="button-wrapper">
            <input type="submit" value="Advanced Search">
            </div>
        </form>
        <div class="top-right">
            <a href="index.html">Google Search</a>
        </div>
    </body>
</html>
