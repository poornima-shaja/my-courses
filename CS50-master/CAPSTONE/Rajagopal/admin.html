<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Add Saree</title>
    <link rel="stylesheet" href="adminstyle.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <!-- Firebase App (required) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
 
</head>
<body>
      <p>Enter saree details below. This will be visible on the website.</p>
  <div class="admin-container">
    <h2>Add New Saree</h2>
    <p class="subtitle">Enter saree details below. This will be visible on the website.</p>

<form id="addSareeForm">

  <label for="code">Saree Code</label>
  <input type="text" id="code" placeholder="S001" required>

  <label for="name">Saree Name</label>
  <input type="text" id="name" placeholder="Kanchipuram Silk Saree" required>

  <label for="category">Category</label>
  <select id="category" required>
    <option value="">Select Category</option>
    <option>Silk</option>
    <option>Cotton</option>
    <option>Wedding</option>
    <option>Daily Wear</option>
  </select>

  <label for="price">Price</label>
  <input type="number" id="price" placeholder="4999" required>
  <label for="image">Saree Image</label>
  <button type="button" id="uploadBtn">Upload Saree Image</button>
<p id="uploadStatus"></p>
      <button type="submit">Add Saree</button>

    </form>
  </div>
<script>
document.addEventListener("DOMContentLoaded", () => {

  window.uploadedImageUrl = "";

  const uploadBtn = document.getElementById("uploadBtn");
  const uploadStatus = document.getElementById("uploadStatus");

  uploadBtn.addEventListener("click", () => {
    cloudinary.openUploadWidget(
      {
        cloudName: "dlxdennpf",
        uploadPreset: "saree_upload",
        folder: "sarees",
        sources: ["local", "camera"],
        multiple: false
      },
      (error, result) => {
        if (!error && result && result.event === "success") {
          window.uploadedImageUrl = result.info.secure_url;
          uploadStatus.innerText = "✅ Image uploaded";
          console.log("Image URL:", window.uploadedImageUrl);
        }
      }
    );
  });

});
</script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAlmuKDv6UdOZ9fKHhfXemB1JGY_iFjF3g",
    authDomain: "rajagopal-sarees.firebaseapp.com",
    projectId: "rajagopal-sarees",
    storageBucket: "rajagopal-sarees.firebasestorage.app",
    messagingSenderId: "48064834072",
    appId: "1:48064834072:web:0bd77feea136b5f52e716d"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  // Initialize Firestore
  const db = firebase.firestore();

  console.log("Firebase connected");
</script>

<script>
const form = document.getElementById("addSareeForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault(); // stop page reload

  const code = document.getElementById("code").value;
  const name = document.getElementById("name").value;
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;

  try {
    // Save data in Firestore
    await db.collection("sarees").doc(code).set({
      code,
      name,
      category,
      price,
      imageUrl: window.uploadedImageUrl, // from Cloudinary
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("✅ Saree added successfully!");
    form.reset();
    document.getElementById("uploadStatus").innerText = ""; // reset status
    window.uploadedImageUrl = "";

  } catch (error) {
    console.error("Error adding saree:", error);
    alert("❌ Something went wrong");
  }
});
</script>


</body>
</html>
